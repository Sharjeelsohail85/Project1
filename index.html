<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha</title>

    <link rel="stylesheet" href="css/material-icons-1.css" />
    <link rel="stylesheet" href="css/material-icons-2.css" />
    <link rel="stylesheet" href="css/roboto.css" />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      #homepage-purpose,
      #homepage-legal-links {
        position: fixed;
        z-index: 2147483647;
        padding: 6px 10px;
        border-radius: 10px;
        background: rgba(20, 20, 20, 0.55);
        backdrop-filter: blur(2px);
        font-family: 'Roboto', sans-serif;
        color: #ffffff;
      }

      #homepage-purpose {
        left: 10px;
        right: 210px;
        bottom: 8px;
        font-size: 12px;
        line-height: 1.35;
      }

      #homepage-legal-links {
        right: 10px;
        bottom: 8px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        line-height: 1.2;
      }

      #homepage-legal-links a {
        color: #ffffff;
        text-decoration: underline;
      }

      #homepage-legal-links .separator {
        color: rgba(255, 255, 255, 0.8);
      }

      @media (max-width: 768px) {
        #homepage-purpose {
          right: 10px;
          bottom: 40px;
          font-size: 11px;
        }

        #homepage-legal-links {
          left: 10px;
          right: 10px;
          justify-content: center;
          font-size: 11px;
        }
      }
    </style>

  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <section id="homepage-purpose" aria-label="Application purpose">
      Octopussol is a video platform where users can discover, upload, migrate, manage, and stream creator content.
    </section>
    <footer id="homepage-legal-links" aria-label="Legal links">
      <a href="https://octopussol.com/PRIVACY_POLICY.md" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
      <span class="separator" aria-hidden="true">•</span>
      <a href="https://octopussol.com/TERMS_AND_CONDITIONS.md" target="_blank" rel="noopener noreferrer">Terms &amp; Conditions</a>
    </footer>
    <script type="module" src="/src/main.jsx"></script>
