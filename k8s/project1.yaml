apiVersion: v1
kind: Namespace
metadata:
  name: project1
---
apiVersion: v1
kind: Secret
metadata:
  name: project1-secrets
  namespace: project1
type: Opaque
stringData:
  APP_KEY: base64:ivhNnMxrTMniMMH5bGuCwWKJQKrisJbanAUsAYMEme0=
  DB_PASSWORD: project1-password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: project1-config
  namespace: project1
data:
  APP_NAME: Project1 Video API
  APP_ENV: production
  APP_DEBUG: "false"
  APP_LOG_LEVEL: info
  APP_URL: https://project1.example.com
  FRONTEND_URL: https://project1.example.com
  SANCTUM_STATEFUL_DOMAINS: project1.example.com
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: project1
  DB_USERNAME: project1
  BROADCAST_DRIVER: log
  CACHE_DRIVER: file
  SESSION_DRIVER: file
  QUEUE_DRIVER: sync
  QUEUE_CONNECTION: sync
  LOG_CHANNEL: stderr
  RUN_MIGRATIONS: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: project1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: project1
            - name: MYSQL_USER
              value: project1
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project1-secrets
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project1-secrets
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: project1
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: project1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/sharjeelsohail85/project1-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: project1-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: project1-secrets
                  key: APP_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project1-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: project1
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: project1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/sharjeelsohail85/project1-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: project1
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project1
  namespace: project1
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  rules:
    - host: project1.example.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080

